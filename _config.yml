/* About Section */
.about {
    background-color: #0a0a0a;
    padding: 80px 40px;
    border-top: 1px solid #d4c5b0;
}

.about h2 {
    font-size: 48px;
    margin-bottom: 60px;
    letter-spacing: 3px;
}

.about-content {
    max-width: 800px;
    margin-bottom: 80px;
}

.about-content p {
    font-size: 14px;
    line-height: 1.8;
    margin-bottom: 25px;
}

.research-axis h3 {
    font-size: 18px;
    margin-bottom: 20px;
    letter-spacing: 2px;
}

.research-axis ul {
    list-style: none;
    padding-left: 0;
}

.research-axis li {
