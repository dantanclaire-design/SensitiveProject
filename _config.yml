    <!-- About Section -->
    <section class="about" id="about">
        <div class="section-container">
            <h2>ABOUT</h2>
            
            <div class="about-content">
                <p>
                    The Sensitive Project is an ongoing artistic research work exploring perception as a constructed system.
                </p>
                <p>
                    Located at the intersection of fashion, photography, astrology, and critical visual theory, this project originates from a disrupted relationship to vision—fragmented, hyper-analytical, and shaped by lived experience.
                </p>
                <p>
                    Rather than representing bodies, The Sensitive Project attempts to reconstruct ways of seeing them through a practice called <strong>body reading</strong>.
                </p>
            </div>

            <div class="research-axis">
                <h3>Research Interests</h3>
                <ul>
                    <li>Perception after trauma and visual distortion</li>
                    <li>Symbolic systems as tools for thinking differently</li>
                    <li>Ownership of the gaze and non-normative representation</li>
                    <li>Synesthetic translation (material, animal, floral)</li>
                    <li>Minor mythological figures as functional lenses</li>
                </ul>
            </div>
        </div>
    </section>

