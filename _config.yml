}

.research-axis li:before {
    content: "•";
    position: absolute;
    left: 0;
    color: #c85a54;
}

/* Contact Section */
.contact {
    background-color: #0a0a0a;
    padding: 80px 40px;
    border-top: 1px solid #d4c5b0;
}

.contact h2 {
    font-size: 48px;
    margin-bottom: 60px;
    letter-spacing: 3px;
}

.contact-info {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    max-width: 1000px;
}

.contact-item h3 {
    font-size: 16px;
    margin-bottom: 20px;
    letter-spacing: 2px;
}

.contact-item p {
    font-size: 13px;
    line-height: 1.8;
    margin-bottom: 15px;
}

.contact-item a {
    color: #c85a54;
}

/* Footer */
.footer {
    background-color: #0a0a0a;
    border-top: 1px solid #d4c5b0;
    padding: 60px 40px;
}

.footer-container {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 40px;
    max-width: 1400px;
    margin: 0 auto;
}

.footer-col h4 {
    font-size: 12px;
    margin-bottom: 20px;
    letter-spacing: 2px;
}

.footer-col ul {
    list-style: none;
}

.footer-col li {
    margin-bottom: 10px;
}

.footer-col a {
    font-size: 12px;
    letter-spacing: 1px;
}

.footer-center {
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.footer-center p {
    font-size: 11px;
    line-height: 1.8;
    letter-spacing: 1px;
    margin-bottom: 20px;
}

.moon-phases {
    font-size: 24px;
    letter-spacing: 10px;
}

/* Responsive */
@media (max-width: 768px) {
    .hero-container {
        grid-template-columns: 1fr;
        gap: 40px;
    }

    .hero-title {
        font-size: 48px;
    }

    .nav-menu {
        gap: 15px;
        font-size: 10px;
    }

    .grid-2 {
        grid-template-columns: 1fr;
    }

    .featured-card {
        grid-template-columns: 1fr;
    }

    .contact-info {
        grid-template-columns: 1fr;
    }

    .footer-container {
        grid-template-columns: 1fr;
    }

    .hamburger {
        display: flex;
    }

    .nav-menu {
        display: none;
    }
}



JavaScript

// Smooth scrolling navigation
const smoothScroll = (target) => {
    const element = document.querySelector(target);
    if (element) {
        window.scrollTo({
            top: element.offsetTop,
            behavior: 'smooth'
        });
    }
};

const scrollLinks = document.querySelectorAll('a[href^="#"]');
scrollLinks.forEach(link => {
    link.addEventListener('click', (e) => {
        e.preventDefault();
        smoothScroll(link.getAttribute('href'));
    });
});

// Mobile menu toggle
